<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Periodic Table | by Aazim Quadiri</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ui-layer">
    <header class="top-bar">
      <div class="glass-pill left-pill">
        <div class="title-group">
          <h1>Periodic Table</h1>
        </div>
        <div class="header-divider"></div>
        <div class="social-links">
          <a href="https://github.com/aazimquadiri" target="_blank" rel="noopener" aria-label="GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
          </a>
          <a href="https://x.com/captainfinite" target="_blank" rel="noopener" aria-label="X">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          </a>
          <a href="https://www.instagram.com/captainfinite" target="_blank" rel="noopener" aria-label="Instagram">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
          </a>
        </div>
      </div>

      <div class="glass-pill right-pill">
        <div class="search-box">
          <span class="search-icon-wrapper"><i data-lucide="search"></i></span>
          <input type="text" id="search" placeholder="Search..." autocomplete="off">
        </div>
        <div class="layout-group">
          <button class="layout-btn is-active" id="table">Table</button>
          <button class="layout-btn" id="sphere">Sphere</button>
          <button class="layout-btn" id="helix">Helix</button>
          <button class="layout-btn" id="grid">Grid</button>
        </div>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle Dark Mode">
          <i data-lucide="moon"></i>
        </button>
      </div>
    </header>
  </div>

  <div class="bottom-bar">
    <div class="bottom-credit">
      Made with <span class="heart">❤️</span> by Aazim Quadiri
    </div>
  </div>

  <div id="scene-scaler">
    <div id="scene" class="is-draggable">
      <div id="scene-content" data-layout="table">
        </div>
    </div>
  </div>

  <template id="element-template">
    <div class="element-card" data-color="0">
      <div class="el-num"></div>
      <div class="el-sym"></div>
      <div class="el-name"></div>
      
      <div class="el-details">
        <div class="det-header">
          <div class="det-num"></div>
          <div class="det-sym"></div>
          <div class="det-name"></div>
        </div>
        <div class="det-content">
          <div class="det-row"><span class="det-label">Mass</span><span class="det-val mass-val"></span></div>
          <div class="det-row"><span class="det-label">Density</span><span class="det-val dens-val"></span></div>
          <div class="det-row"><span class="det-label">Melting Pt</span><span class="det-val melt-val"></span></div>
          <div class="det-row"><span class="det-label">Boiling Pt</span><span class="det-val boil-val"></span></div>
        </div>
      </div>
    </div>
  </template>

  <script type="module" src="script.js"></script>
</body>
</html>
